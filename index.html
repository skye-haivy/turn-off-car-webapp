<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f14">
    <title>TURN-OFF Car Navigation</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">TURN-OFF</p>
          <h1>Car Navigation</h1>
        </div>
        <div class="connection-pill" id="connectionStatus" data-state="disconnected">
          DISCONNECTED
        </div>
      </header>

      <section class="panel setup-panel" aria-labelledby="setupTitle">
        <h2 id="setupTitle">Connection</h2>
        <div class="field-grid">
          <label class="field">
            <span>ESP32 IP</span>
            <input id="espIp" type="text" inputmode="decimal" autocomplete="off" value="10.42.177.234">
          </label>
          <label class="field">
            <span>OpenRouteService API Key</span>
            <input id="apiKey" type="password" autocomplete="off" placeholder="Paste API key">
          </label>
        </div>
        <div class="button-row">
          <button class="primary" id="connectButton" type="button">Connect ESP32</button>
          <button class="primary secondary" id="bleConnectButton" type="button">Connect Bluetooth</button>
          <button id="disconnectButton" type="button">Disconnect</button>
        </div>
        <p class="notice" id="httpsNotice" hidden>
          GitHub Pages uses HTTPS, so plain ESP32 WebSocket may be blocked. Use Connect Bluetooth for live ESP32 testing from this hosted page.
        </p>
      </section>

      <section class="panel route-panel" aria-labelledby="routeTitle">
        <h2 id="routeTitle">Route</h2>
        <label class="field">
          <span>Destination</span>
          <div class="search-row">
            <input id="destinationQuery" type="search" autocomplete="off" placeholder="Search a place or address">
            <button id="searchButton" type="button">Search</button>
          </div>
        </label>
        <div class="suggestions" id="suggestions" aria-live="polite"></div>

        <div class="status-grid">
          <div>
            <span class="label">Transport</span>
            <strong id="transportStatus">None</strong>
          </div>
          <div>
            <span class="label">GPS</span>
            <strong id="gpsStatus">Waiting</strong>
          </div>
          <div>
            <span class="label">Destination</span>
            <strong id="destinationStatus">Not selected</strong>
          </div>
          <div>
            <span class="label">Next</span>
            <strong id="nextInstruction">None</strong>
          </div>
          <div>
            <span class="label">Distance</span>
            <strong id="distanceStatus">--</strong>
          </div>
        </div>

        <div class="button-row">
          <button class="primary" id="startButton" type="button">Start Navigation</button>
          <button id="stopButton" type="button">Stop</button>
        </div>
      </section>

      <section class="panel test-panel" aria-labelledby="testTitle">
        <h2 id="testTitle">Manual Tests</h2>
        <div class="test-grid">
          <button type="button" data-test-direction="LEFT">LEFT</button>
          <button type="button" data-test-direction="RIGHT">RIGHT</button>
          <button type="button" data-test-direction="STRAIGHT">STRAIGHT</button>
          <button type="button" data-test-direction="UTURN">UTURN</button>
          <button type="button" data-test-direction="ROUNDABOUT">ROUNDABOUT</button>
          <button type="button" data-test-direction="ARRIVED">ARRIVED</button>
        </div>
      </section>

      <section class="panel log-panel" aria-labelledby="logTitle">
        <h2 id="logTitle">Log</h2>
        <pre id="eventLog" aria-live="polite"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
